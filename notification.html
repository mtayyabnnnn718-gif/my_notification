<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Notification</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#1243b7;
    font-family:Arial, sans-serif;
}

/* Notification Box */
.notification{
    width:320px;
    padding:18px 20px;
    border-radius:16px;
    
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,0.15);
    
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    
    color:#fff;
    position:relative;
    overflow:hidden;
}

/* Accent Glow */
.notification::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(0,255,255,0.15), transparent 60%);
    transform: rotate(25deg);
}

/* Icon */
.icon{
    width:40px;
    height:40px;
    border-radius:12px;
    background: linear-gradient(135deg, #00c6ff, #7aa4d7);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    margin-bottom:10px;
}

/* Title */
.title{
    font-size:16px;
    font-weight:bold;
    margin-bottom:6px;
}

/* Message */
.message{
    font-size:13px;
    color:rgba(255,255,255,0.75);
    line-height:1.4;
}

/* Time badge */
.time{
    margin-top:10px;
    font-size:11px;
    color:rgba(255,255,255,0.5);
}
</style>

</head>

<body>

<div class="notification">
    <div class="icon">🔔</div>
    <div class="title">New Notification</div>
    <div class="message">
    "Your system has been successfully updated, and all services are active."
    </div>
    <div class="time">Just now</div>
</div>

</body>
</html>
